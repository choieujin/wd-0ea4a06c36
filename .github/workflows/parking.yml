name: 실시간 주차 현황 갱신

# parking.json 커밋은 [skip ci] 라서 Pages 배포(429 한도)를 소모하지 않고,
# PUBLIC 저장소 → Actions 실행 분도 무제한. 따라서 상시 10분 간격으로 갱신한다.
on:
  schedule:
    - cron: "*/10 * * * *" # 상시 10분 간격
  workflow_dispatch:        # 수동 실행 버튼

# 동시 실행 방지 (겹치는 cron 대비)
concurrency:
  group: parking
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 주차 현황 수집
        run: node scripts/fetch-parking.mjs

      # parking.json 은 커밋만 하고 배포는 하지 않는다.
      # 청첩장(parking.js)이 raw.githubusercontent.com 에서 최신 커밋을 직접 읽으므로
      # Pages 재배포가 필요 없다 → Pages 배포 빈도 제한(429) 소모 없음.
      - name: 변경 시 커밋 (배포 없음)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/parking.json
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: 실시간 주차 현황 갱신 [skip ci]"
            git push
          fi
