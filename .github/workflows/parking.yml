name: 실시간 주차 현황 갱신

# cron 은 UTC 기준. KST = UTC+9.
#  - 매주 일요일 12:00~15:00 KST = 03:00~06:00 UTC: 10분 간격
#    (결혼식 당일 10/25도 일요일이라 자동 포함)
on:
  schedule:
    - cron: "*/10 3-5 * * 0" # 매주 일요일 12:00~14:50 KST 10분 간격
    - cron: "0 6 * * 0"      # 매주 일요일 15:00 KST 마지막 1회
  workflow_dispatch:          # 수동 실행 버튼

# 동시 실행 방지 (겹치는 cron 대비)
concurrency:
  group: parking
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 주차 현황 수집
        env:
          SEOUL_API_KEY: ${{ secrets.SEOUL_API_KEY }}
        run: node scripts/fetch-parking.mjs

      - name: 변경 시 커밋
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/parking.json
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: 실시간 주차 현황 갱신 [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # GITHUB_TOKEN 푸시는 push 워크플로를 트리거하지 않으므로 배포를 직접 실행
      - name: Pages 재배포 트리거
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --ref main
